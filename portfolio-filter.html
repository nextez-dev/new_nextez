<style>
        body { font-family: 'Pretendard Variable', Pretendard, sans-serif; background-color: #131313; color: #e5e2e1; overflow: hidden; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 5px; }

        /* filter chip */

        .char { display: inline-block; will-change: filter; filter: brightness(0.8); animation: charShine 5s ease-in-out infinite; }
        @keyframes charShine { 0%,55%,100% { filter: brightness(0.8); } 26% { filter: brightness(1.55) drop-shadow(0 0 8px rgba(255,255,255,0.35)); } }
        .emph .char { position: relative; }
        .emph .char::before { content:''; position:absolute; top:-0.34em; left:50%; transform:translateX(-50%); width:0.16em; height:0.16em; border-radius:9999px; background:#ff6600; }

<div>
<span class="font-label-bold text-label-bold text-primary uppercase tracking-widest inline-flex items-center gap-2 mb-md">Portfolio <span class="text-[10px] px-2 py-0.5 rounded-full bg-primary-container/15 border border-primary-container/40 normal-case tracking-normal">필터형 · 비교용</span></span>
<h1 id="main-copy" class="text-[52px] xl:text-[64px] leading-[1.1] font-bold mb-lg">25년, 수많은 <span class="text-primary-container emph">현장</span>에서 만든 것이<br><span class="text-primary-container">지금도 멈추지 않고 돌아갑니다</span></h1>
<p class="text-on-surface-variant text-base leading-relaxed max-w-lg mb-lg">제주 공공·산업 현장에 적용된 360여 개 프로젝트와 54건의 정부 R&amp;D·사업화 — <span class="text-on-surface font-semibold">분야 필터</span>로 대표 실적을 한눈에 골라보세요.</p>
<!-- 분야 필터 칩 -->

<script>
        // ===== 기술분야 데이터 (portfolio.html 과 동일) =====
        const TECH_FIELDS = [
            { key: 'ai', en: 'AI · Data', kr: 'AI · 빅데이터', icon: 'smart_toy', count: '12+',
              groups: [
                { label: 'SI', items: [
                    { n: '제주농업 DX기반 구축 사업', c: '제주특별자치도농업기술원', flag: true },
                    { n: '제주 농업 디지털 영농지원', c: '제주특별자치도농업기술원', flag: true } ]},
                { label: 'R&D', items: [
                    { n: '빅데이터 플랫폼 구축 및 센터', c: '한국정보화진흥원' },
                    { n: '인공지능 기반 맞춤형 관광 추천', c: '문화체육관광부' },
                    { n: '그린에너지 AI융합 지원', c: '정보통신산업진흥원' } ]} ] },
            { key: 'platform', en: 'Platform · Solution', kr: '플랫폼 · 솔루션', icon: 'hub', count: '75+',
              groups: [
                { label: 'SI', items: [
                    { n: '탐나오', c: '제주관광협회' },
                    { n: '여수엔', c: '여수시청' },
                    { n: '제주DA 플랫폼', c: '제주특별자치도농업기술원', flag: true },
                    { n: '제주국제전기차엑스포', c: '' } ]},
                { label: 'R&D', items: [
                    { n: '노인 통합돌봄 영양관리 재가서비스 플랫폼', c: '중소벤처기업부' },
                    { n: '제주관광 라이브 커머스 OTA 플랫폼', c: '중소벤처기업부' },
                    { n: '테마프리마켓 운영 서비스 플랫폼', c: '중소벤처기업부' },
                    { n: '제주관광 O2O 서비스 플랫폼', c: '산업통상자원부' },
                    { n: '관광지 할인 Ticket 판매 운영 플랫폼', c: '산업통상자원부' },
                    { n: '관광 챗봇 서비스 플랫폼', c: '산업통상자원부' } ]} ] },
            { key: 'si', en: 'Web · System Integration', kr: '웹 · 시스템 구축 (SI)', icon: 'dns', count: '500+',
              groups: [
                { label: 'SI', items: [
                    { n: '제주시청', c: '' },
                    { n: '제주관광협회', c: '' },
                    { n: '제주특별자치도농업기술원', c: '' } ]} ] },
            { key: 'iot', en: 'IoT · Energy', kr: 'IoT · 에너지', icon: 'sensors', count: '7+',
              groups: [
                { label: 'R&D', items: [
                    { n: '제주 그린에너지 AI융합 지원', c: '정보통신산업진흥원' },
                    { n: '전기차 운영 서비스 기술 개발', c: '산업통상자원부' },
                    { n: 'ESS 연계형 스마트 풍력에너지 운영', c: '제주지역사업평가원' } ]} ] }
        ];

        (function () {
            const esc = s => (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const META = {};
            TECH_FIELDS.forEach(f => META[f.key] = { en: f.en, kr: f.kr, icon: f.icon, count: f.count });

            // 프로젝트 평탄화
            const PROJECTS = [];
            TECH_FIELDS.forEach(f => f.groups.forEach(g => g.items.forEach(it =>
                PROJECTS.push({ field: f.key, label: g.label, n: it.n, c: it.c || '', flag: !!it.flag })
            )));

            // 카드 렌더
            const gridEl = document.getElementById('proj-grid');
            gridEl.innerHTML = PROJECTS.map(p => {
                const labelColor = p.label === 'R&D' ? 'bg-primary/15 text-primary-container border-primary/30' : 'bg-primary-container/20 text-primary border-primary-container/30';
                return '<div class="proj-card glass-card rounded-lg p-md flex flex-col" data-field="' + p.field + '">' +
                    '<div class="flex items-center gap-2 mb-1.5 flex-wrap">' +
                        '<span class="text-[10px] font-bold px-1.5 py-0.5 rounded border ' + labelColor + '">' + p.label + '</span>' +
                        (p.flag ? '<span class="text-[10px] px-1.5 py-0.5 rounded-full bg-primary-container/20 text-primary border border-primary-container/40">대표</span>' : '') +
                        (p.c ? '<span class="text-[11px] text-on-surface/45 truncate min-w-0">' + esc(p.c) + '</span>' : '') +
                    '</div>' +
                    '<h4 class="text-sm font-bold text-on-surface leading-snug mb-2 flex-grow">' + esc(p.n) + '</h4>' +
                    '<div class="flex items-center gap-1 text-[11px] font-semibold text-primary-container mt-auto">' +
                        '<span class="material-symbols-outlined text-sm">' + META[p.field].icon + '</span>' + esc(META[p.field].en) +
                    '</div>' +
                '</div>';
            }).join('');

            // 필터 칩 렌더
            const barEl = document.getElementById('filter-bar');
            const countEl = document.getElementById('filter-count');
            const chips = [{ key: 'all', en: '전체' }].concat(TECH_FIELDS.map(f => ({ key: f.key, en: f.en, icon: f.icon })));
            barEl.innerHTML = chips.map((c, i) =>
                '<button type="button" data-filter="' + c.key + '" class="fchip ' + (i === 0 ? 'active' : '') + ' inline-flex items-center gap-1 text-[13px] px-3 py-1.5 rounded-full bg-surface-container/70 border border-white/15 text-on-surface-variant hover:border-primary">' +
                (c.icon ? '<span class="material-symbols-outlined text-base">' + c.icon + '</span>' : '') + c.en + '</button>'
            ).join('');

            let active = 'all';
            function apply() {
                let shown = 0;
                document.querySelectorAll('.proj-card').forEach(card => {
                    const on = (active === 'all' || card.dataset.field === active);
                    card.style.display = on ? '' : 'none';
                    if (on) shown++;
                });
                const label = active === 'all' ? '전체' : META[active].en;
                countEl.textContent = label + ' · ' + shown + '개 프로젝트';
                gridEl.scrollTop = 0;
            }
            barEl.addEventListener('click', e => {
                const b = e.target.closest('button[data-filter]');
                if (!b) return;
                active = b.dataset.filter;
                document.querySelectorAll('.fchip').forEach(x => x.classList.toggle('active', x === b));
                apply();
            });
            apply();

            // 메인카피 셔머
            (function () {
                const h = document.getElementById('main-copy'); if (!h) return; let idx = 0;
                (function walk(node) {
                    Array.prototype.slice.call(node.childNodes).forEach(function (child) {
                        if (child.nodeType === 3) {
                            const frag = document.createDocumentFragment();
                            Array.from(child.textContent).forEach(function (ch) {
                                if (ch === ' ') { frag.appendChild(document.createTextNode(' ')); return; }
                                const s = document.createElement('span'); s.className = 'char'; s.textContent = ch;
                                s.style.animationDelay = (idx * 0.05).toFixed(2) + 's'; idx++; frag.appendChild(s);
                            });
                            node.replaceChild(frag, child);
                        } else if (child.nodeType === 1 && child.tagName !== 'BR') { walk(child); }
                    });
                })(h);
            })();
        })();
</script>
